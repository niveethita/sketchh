<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sketchh</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <canvas id="myCanvas" width="800" height="600"></canvas>
  
  <div id="toolbar">
    <input type = "color" id="brushColor" value="#000000">
    <input type = "range" id="brushSize" min="1" max="50" value="5">
    <button type="button" class="tool" id="eraser">Erase</button>
    <button type="button" class="tool" id="pen">Pen</button>
    <button type="button" class="tool" id="clear">Clear</button>
    <input type = "color" id="bgColor" value="#ffffff">
    <button type="button" class="tool" id="fillBg">Fill Background</button>  
    <button type="button" class="tool" id="fillShape">Fill Shape</button>    
  </div>
</body>
</html>
